<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowUp" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowDown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb7185;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22" fill="url(#bgGrad)" />

  <!-- Border glow -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22"
        fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4" />

  <!-- Arrow UP-RIGHT (income / emerald) — from bottom-left to top-right -->
  <g filter="url(#glow)">
    <!-- Arrow shaft -->
    <line x1="28" y1="72" x2="68" y2="32"
          stroke="url(#arrowUp)" stroke-width="7" stroke-linecap="round"/>
    <!-- Arrowhead pointing up-right -->
    <polyline points="46,28 68,32 64,54"
              stroke="url(#arrowUp)" stroke-width="7"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Arrow DOWN-RIGHT (expense / rose) — from top-left to bottom-right -->
  <g filter="url(#glow)">
    <!-- Arrow shaft -->
    <line x1="28" y1="32" x2="68" y2="72"
          stroke="url(#arrowDown)" stroke-width="7" stroke-linecap="round"/>
    <!-- Arrowhead pointing down-right -->
    <polyline points="46,76 68,72 64,50"
              stroke="url(#arrowDown)" stroke-width="7"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
